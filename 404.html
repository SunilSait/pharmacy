<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found — MediCare Pharmacy. Return to our homepage for medicines, health devices and baby care.">
    <title>404 — Page Not Found | MediCare Pharmacy</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%23059669' fill-opacity='0.15' stroke='%23059669' stroke-width='2'/%3E%3Crect x='42' y='22' width='16' height='56' rx='4' fill='%23059669'/%3E%3Crect x='22' y='42' width='56' height='16' rx='4' fill='%23059669'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#059669',secondary:'#0F172A'}}}}</script>
</head>
<body>

<div class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-4 py-16" style="background:linear-gradient(145deg,#020D07 0%,#071A12 100%);">
    <!-- Top-right controls -->
    <div class="auth-top-icons">
        <button class="icon-btn dark-toggle" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
        <button class="icon-btn rtl-toggle" title="Toggle RTL"><i class="fas fa-exchange-alt"></i></button>
    </div>

    <!-- Background decorations -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute w-[600px] h-[600px] rounded-full" style="background:radial-gradient(circle,rgba(5,150,105,0.07) 0%,transparent 70%);top:-200px;right:-200px;"></div>
        <div class="absolute w-[400px] h-[400px] rounded-full" style="background:radial-gradient(circle,rgba(5,150,105,0.04) 0%,transparent 70%);bottom:-150px;left:-150px;"></div>
        <div class="absolute inset-0" style="background-image:linear-gradient(rgba(5,150,105,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.025) 1px,transparent 1px);background-size:60px 60px;"></div>
        <!-- Floating medical icons -->
        <div class="absolute top-[15%] left-[5%] opacity-10" style="animation:float 8s ease-in-out infinite;">
            <i class="fas fa-pills text-[#059669] text-4xl"></i>
        </div>
        <div class="absolute bottom-[20%] right-[6%] opacity-10" style="animation:float 10s ease-in-out infinite 2s;">
            <i class="fas fa-stethoscope text-[#34D399] text-5xl"></i>
        </div>
    </div>

    <!-- Content -->
    <div class="relative z-10 text-center max-w-2xl">
        <!-- Logo -->
        <div class="mb-14">
            <a href="index.html" class="inline-flex items-center gap-2.5 group">
                <svg width="36" height="36" viewBox="0 0 100 100" fill="none">
                    <defs><linearGradient id="g404m" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34D399"/></linearGradient></defs>
                    <circle cx="50" cy="50" r="46" fill="url(#g404m)" fill-opacity="0.12" stroke="#059669" stroke-width="1.5" stroke-opacity="0.5"/>
                    <rect x="42" y="22" width="16" height="56" rx="4" fill="#059669"/>
                    <rect x="22" y="42" width="56" height="16" rx="4" fill="#059669"/>
                </svg>
                <span class="font-bold text-xl text-white group-hover:text-[#34D399] transition-colors" style="font-family:'Sora',sans-serif;">MediCare</span>
            </a>
        </div>

        <!-- 404 Badge -->
        <div class="mb-8">
            <div class="relative inline-block">
                <div class="absolute inset-0 rounded-3xl border-2 border-dashed border-[#059669]/20 scale-110"></div>
                <div class="relative px-10 py-8 rounded-3xl" style="background:rgba(5,150,105,0.06);border:1px solid rgba(5,150,105,0.15);">
                    <div class="text-[7rem] sm:text-[9rem] font-bold leading-none" style="font-family:'Sora',sans-serif;background:linear-gradient(135deg,#059669 0%,#34D399 50%,#047857 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">404</div>
                    <div class="absolute top-3 right-4 text-[10px] text-[#059669]/40 font-bold uppercase tracking-[0.2em] rotate-12">NOT FOUND</div>
                    <div class="absolute bottom-3 left-4 text-[10px] text-[#059669]/30 font-bold uppercase tracking-[0.15em] -rotate-6">MEDICARE</div>
                </div>
            </div>
        </div>

        <h1 class="text-white mb-4" style="font-family:'Sora',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);">
            Medicine Not <span class="green-text">Found</span>
        </h1>
        <p class="text-neutral-400 text-lg mb-10 max-w-lg mx-auto">The page you're looking for seems to have gone missing from our shelves. Let's get you back to the right aisle!</p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
            <a href="index.html" class="btn btn-primary btn-lg" id="err404-home">
                <i class="fas fa-house text-xs"></i> Back to Home
            </a>
            <a href="contact.html" class="btn btn-lg" style="border:1.5px solid rgba(5,150,105,0.35);color:#34D399;border-radius:50px;" id="err404-contact">
                <i class="fas fa-phone text-xs"></i> Contact Us
            </a>
        </div>

        <!-- Quick links -->
        <div class="flex flex-wrap justify-center gap-4">
            <a href="products.html" class="text-xs text-neutral-500 hover:text-[#34D399] transition-colors uppercase tracking-widest font-semibold">Products</a>
            <span class="text-neutral-700">·</span>
            <a href="services.html" class="text-xs text-neutral-500 hover:text-[#34D399] transition-colors uppercase tracking-widest font-semibold">Services</a>
            <span class="text-neutral-700">·</span>
            <a href="about.html" class="text-xs text-neutral-500 hover:text-[#34D399] transition-colors uppercase tracking-widest font-semibold">About</a>
            <span class="text-neutral-700">·</span>
            <a href="contact.html#prescription" class="text-xs text-neutral-500 hover:text-[#34D399] transition-colors uppercase tracking-widest font-semibold">Upload Rx</a>
        </div>
    </div>
</div>

<script src="script.js"></script>
<style>
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-14px);} }
</style>
</body>
</html>
